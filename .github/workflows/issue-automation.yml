name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write
  contents: write

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    outputs:
      category: ${{ steps.categorize.outputs.category }}
      priority: ${{ steps.prioritize.outputs.priority }}
      issue-number: ${{ github.event.issue.number }}
    steps:
      - name: Ensure labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'bug', color: 'd73a4a', description: 'Something isn\'t working' },
              { name: 'enhancement', color: 'a2eeef', description: 'New feature or request' },
              { name: 'epic', color: '5319e7', description: 'Large feature requiring multiple sub-tasks' },
              { name: 'maintenance', color: 'fbca04', description: 'Maintenance and housekeeping tasks' },
              { name: 'priority-critical', color: 'b60205', description: 'Critical priority issue' },
              { name: 'priority-high', color: 'd93f0b', description: 'High priority issue' },
              { name: 'priority-medium', color: 'e4e669', description: 'Medium priority issue' },
              { name: 'priority-low', color: '0e8a16', description: 'Low priority issue' },
              { name: 'needs-triage', color: 'ededed', description: 'Needs to be reviewed by maintainers' },
              { name: 'needs-review', color: 'fbca04', description: 'Awaiting review from maintainers' },
              { name: 'first-time-contributor', color: '7057ff', description: 'Issue created by first-time contributor' }
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
              } catch (e) {
                if (e.status === 422) {
                  // Label already exists, update it
                  try {
                    await github.rest.issues.updateLabel({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      name: label.name,
                      color: label.color,
                      description: label.description
                    });
                  } catch (updateErr) {
                    // Ignore update errors
                  }
                }
              }
            }

      - name: Categorize issue
        id: categorize
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            let category = '';
            if (title.includes('bug')) {
              category = 'bug';
            } else if (title.includes('epic')) {
              category = 'epic';
            } else if (title.includes('maintenance')) {
              category = 'maintenance';
            }
            core.setOutput('category', category);

      - name: Prioritize issue
        id: prioritize
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const text = title + ' ' + body;
            let priority = '';
            if (text.match(/critical|urgent|production|outage/)) {
              priority = 'priority-critical';
            } else if (text.match(/important|high|blocking/)) {
              priority = 'priority-high';
            } else if (text.match(/medium|normal/)) {
              priority = 'priority-medium';
            } else if (text.match(/low|nice-to-have|minor/)) {
              priority = 'priority-low';
            } else {
              priority = 'priority-medium';
            }
            core.setOutput('priority', priority);

      - name: Apply labels
        uses: actions/github-script@v7
        with:
          script: |
            const category = '${{ steps.categorize.outputs.category }}';
            const priority = '${{ steps.prioritize.outputs.priority }}';
            const labelsToAdd = ['needs-triage'];
            if (category) {
              labelsToAdd.push(category);
            }
            if (priority) {
              labelsToAdd.push(priority);
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: labelsToAdd
            });

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: github.event.action == 'opened' && contains(github.event.issue.title, 'Epic') || github.event.action == 'opened' && contains(github.event.issue.title, 'epic')
    steps:
      - name: Create sub-issues for epic
        uses: actions/github-script@v7
        with:
          script: |
            const parentNumber = context.payload.issue.number;
            const parentTitle = context.payload.issue.title;
            const tasks = [
              'Requirements Analysis',
              'Design and Architecture',
              'Implementation',
              'Testing and Documentation'
            ];
            const subIssueNumbers = [];
            for (let i = 0; i < tasks.length; i++) {
              const subIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[SUBTASK] ${parentTitle} - Task ${i + 1}: ${tasks[i]}`,
                body: `Related to #${parentNumber}\n\nThis is sub-task ${i + 1} of the epic: ${parentTitle}\n\n## Objective\nComplete the ${tasks[i]} phase for this epic.`,
                labels: ['enhancement', 'needs-review']
              });
              subIssueNumbers.push(subIssue.data.number);
            }
            // Update parent issue with checklist
            const currentBody = context.payload.issue.body || '';
            let checklist = '\n\n## Epic Tasks\n';
            for (let i = 0; i < tasks.length; i++) {
              checklist += `- [ ] #${subIssueNumbers[i]} - Task ${i + 1}: ${tasks[i]}\n`;
            }
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parentNumber,
              body: currentBody + checklist
            });

  auto-response:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: github.event.action == 'opened'
    steps:
      - name: Check first-time contributor
        id: check-first-time
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.issue.user.login;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: author,
              state: 'all',
              per_page: 10
            });
            // Filter to only actual issues (not PRs) created by this user
            const userIssues = issues.data.filter(i => !i.pull_request);
            const isFirstTime = userIssues.length <= 1;
            core.setOutput('is-first-time', isFirstTime.toString());

      - name: Welcome first-time contributor
        if: steps.check-first-time.outputs.is-first-time == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['first-time-contributor']
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `## Welcome! 🎉\n\nHi @${context.payload.issue.user.login}, welcome to our project! This is your first issue here, and we're glad to have you.\n\nOur team will review your issue shortly. In the meantime, please make sure you've provided all the necessary details.\n\nThank you for contributing!`
            });

      - name: Post response based on issue type
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            let responseBody = '';
            if (title.includes('bug')) {
              responseBody = `## Bug Report Guidelines\n\nThank you for reporting this bug! To help us resolve it quickly, please ensure:\n\n- [ ] Steps to reproduce are clearly described\n- [ ] Expected vs actual behavior is documented\n- [ ] Environment details are provided\n- [ ] Screenshots or logs are attached if applicable\n\nOur team will investigate this issue and provide updates here.`;
            } else if (title.includes('epic')) {
              responseBody = `## Feature Request Process\n\nThank you for submitting this epic feature request! Here's our process:\n\n1. **Review**: Our team will review the requirements\n2. **Breakdown**: Sub-tasks will be created for tracking\n3. **Planning**: Tasks will be assigned to upcoming sprints\n4. **Implementation**: Development will proceed in phases\n\nWe'll keep you updated on progress through the linked sub-issues.`;
            } else if (title.includes('maintenance')) {
              responseBody = `## Maintenance Guidelines\n\nThank you for identifying this maintenance task! Our approach:\n\n- [ ] Assess impact and risk level\n- [ ] Schedule during appropriate maintenance window\n- [ ] Prepare rollback plan\n- [ ] Execute with monitoring\n- [ ] Verify completion and document changes\n\nA maintainer will review this task and schedule it accordingly.`;
            } else {
              responseBody = `## Thank You!\n\nThank you for opening this issue. Our team will review it and respond shortly.\n\nPlease make sure you've provided enough context for us to understand and address your concern.`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: responseBody
            });

      - name: Set milestone for high priority issues
        uses: actions/github-script@v7
        with:
          script: |
            const priority = '${{ needs.issue-triage.outputs.priority }}';
            if (priority === 'priority-high' || priority === 'priority-critical') {
              // Find or create v1.0.0 milestone
              let milestone;
              const milestones = await github.rest.issues.listMilestones({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open'
              });
              milestone = milestones.data.find(m => m.title === 'v1.0.0');
              if (!milestone) {
                const created = await github.rest.issues.createMilestone({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: 'v1.0.0',
                  description: 'Version 1.0.0 release milestone'
                });
                milestone = created.data;
              }
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                milestone: milestone.number
              });
            }

      - name: Update status label
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                name: 'needs-triage'
              });
            } catch (e) {
              // Label might not exist yet, ignore
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['needs-review']
            });
