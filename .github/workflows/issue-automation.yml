name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write
  contents: write

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    outputs:
      category: ${{ steps.categorize.outputs.category }}
      priority: ${{ steps.prioritize.outputs.priority }}
      is_epic: ${{ steps.categorize.outputs.is_epic }}
    steps:
      - name: Categorize and Label Issue
        id: categorize
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = (issue.body || '').toLowerCase();

            // Ensure all required labels exist
            const labelsToCreate = [
              { name: 'bug', color: 'd73a4a', description: 'Something isn\'t working' },
              { name: 'enhancement', color: 'a2eeef', description: 'New feature or request' },
              { name: 'epic', color: '7057ff', description: 'Large feature requiring multiple sub-tasks' },
              { name: 'maintenance', color: 'fbca04', description: 'Maintenance and housekeeping tasks' },
              { name: 'priority-critical', color: 'b60205', description: 'Critical priority issue' },
              { name: 'priority-high', color: 'd93f0b', description: 'High priority issue' },
              { name: 'priority-medium', color: 'fbca04', description: 'Medium priority issue' },
              { name: 'priority-low', color: '0e8a16', description: 'Low priority issue' },
              { name: 'needs-triage', color: 'e4e669', description: 'Needs to be reviewed by maintainers' },
              { name: 'needs-review', color: 'f9d0c4', description: 'Awaiting review from maintainers' },
              { name: 'first-time-contributor', color: '7057ff', description: 'Issue created by first-time contributor' }
            ];

            for (const label of labelsToCreate) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
              } catch (e) {
                if (e.status !== 422) {
                  console.log(`Note: Label ${label.name} may already exist`);
                }
              }
            }

            // Determine category
            let category = '';
            let isEpic = false;

            if (title.includes('bug')) {
              category = 'bug';
            }
            if (title.includes('epic')) {
              category = 'epic';
              isEpic = true;
            }
            if (title.includes('maintenance')) {
              category = 'maintenance';
            }

            // Build labels to add
            const labelsToAdd = ['needs-triage'];
            if (category) {
              labelsToAdd.push(category);
            }

            core.setOutput('category', category);
            core.setOutput('is_epic', isEpic.toString());

            // Add labels
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: labelsToAdd
            });

      - name: Assign Priority
        id: prioritize
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = (issue.body || '').toLowerCase();
            const combined = title + ' ' + body;

            // Priority determination (highest wins)
            let priority = 'priority-medium';

            const criticalKeywords = ['critical', 'urgent', 'production', 'outage'];
            const highKeywords = ['important', 'high', 'blocking'];
            const mediumKeywords = ['medium', 'normal'];
            const lowKeywords = ['low', 'nice-to-have', 'minor'];

            if (criticalKeywords.some(k => combined.includes(k))) {
              priority = 'priority-critical';
            } else if (highKeywords.some(k => combined.includes(k))) {
              priority = 'priority-high';
            } else if (lowKeywords.some(k => combined.includes(k))) {
              priority = 'priority-low';
            } else {
              priority = 'priority-medium';
            }

            core.setOutput('priority', priority);

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [priority]
            });

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: github.event.action == 'opened' && needs.issue-triage.outputs.is_epic == 'true'
    steps:
      - name: Create Sub-Issues for Epic
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const parentNumber = issue.number;
            const originalTitle = issue.title;

            const tasks = [
              'Requirements Analysis',
              'Design and Architecture',
              'Implementation',
              'Testing and Documentation'
            ];

            const subIssueNumbers = [];

            for (let i = 0; i < tasks.length; i++) {
              const taskName = tasks[i];
              const subTitle = `[SUBTASK] ${originalTitle} - Task ${i + 1}: ${taskName}`;
              const subBody = `Related to #${parentNumber}\n\nThis is task ${i + 1} of the epic: **${originalTitle}**\n\n## Description\nImplement ${taskName} for this epic.`;

              const subIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: subTitle,
                body: subBody,
                labels: ['enhancement', 'needs-review']
              });

              subIssueNumbers.push(subIssue.data.number);
            }

            // Update parent issue with checklist
            const checklist = subIssueNumbers.map((num, idx) => {
              return `- [ ] #${num} - Task ${idx + 1}: ${tasks[idx]}`;
            }).join('\n');

            const updatedBody = (issue.body || '') + `\n\n## Epic Tasks\n${checklist}`;

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parentNumber,
              body: updatedBody
            });

  auto-response:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: github.event.action == 'opened'
    steps:
      - name: Check First Time Contributor and Respond
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const author = issue.user.login;
            const category = '${{ needs.issue-triage.outputs.category }}';
            const priority = '${{ needs.issue-triage.outputs.priority }}';

            // Check if first-time contributor in this repo
            let isFirstTime = true;
            try {
              const issues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                creator: author,
                state: 'all',
                per_page: 2
              });
              // If there's more than 1 issue (the current one), they've contributed before
              if (issues.data.length > 1) {
                isFirstTime = false;
              }
            } catch (e) {
              console.log('Error checking contributor history:', e.message);
              isFirstTime = false;
            }

            if (isFirstTime) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['first-time-contributor']
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '👋 Welcome! Thank you for creating your first issue in this repository. We appreciate your contribution and will review this shortly.'
              });
            }

            // Post type-specific response
            let responseBody = '';

            if (category === 'bug') {
              responseBody = `## Bug Report Guidelines\n\nThank you for reporting this bug! To help us resolve it quickly, please ensure you have provided:\n\n- [ ] Steps to reproduce\n- [ ] Expected behavior\n- [ ] Actual behavior\n- [ ] Environment details (OS, Node.js version, etc.)\n- [ ] Screenshots or logs if applicable\n\nOur team will investigate this issue and provide updates here.`;
            } else if (category === 'epic') {
              responseBody = `## Feature Request Process\n\nThank you for submitting this epic feature request! Here's our process:\n\n1. **Review** - The team will review the requirements\n2. **Breakdown** - Sub-tasks will be created automatically\n3. **Planning** - Tasks will be prioritized and assigned\n4. **Implementation** - Work will begin on individual tasks\n\nPlease check the sub-issues created below for tracking individual tasks.`;
            } else if (category === 'maintenance') {
              responseBody = `## Maintenance Guidelines\n\nThank you for flagging this maintenance task! Our maintenance process includes:\n\n- [ ] Impact assessment\n- [ ] Scheduling during low-traffic periods\n- [ ] Testing in staging environment\n- [ ] Rollback plan preparation\n\nThe team will evaluate and schedule this maintenance work.`;
            } else {
              responseBody = `## Issue Received\n\nThank you for creating this issue. Our team will review it shortly and assign appropriate resources.`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: responseBody
            });

            // Set milestone for high priority issues
            if (priority === 'priority-high' || priority === 'priority-critical') {
              // Create or get milestone
              let milestoneNumber;
              try {
                const milestones = await github.rest.issues.listMilestones({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open'
                });
                const existing = milestones.data.find(m => m.title === 'v1.0.0');
                if (existing) {
                  milestoneNumber = existing.number;
                } else {
                  const created = await github.rest.issues.createMilestone({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: 'v1.0.0',
                    description: 'Version 1.0.0 release milestone'
                  });
                  milestoneNumber = created.data.number;
                }
              } catch (e) {
                console.log('Error with milestone:', e.message);
                // Try to create it
                try {
                  const created = await github.rest.issues.createMilestone({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: 'v1.0.0',
                    description: 'Version 1.0.0 release milestone'
                  });
                  milestoneNumber = created.data.number;
                } catch (e2) {
                  console.log('Could not create milestone:', e2.message);
                }
              }

              if (milestoneNumber) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  milestone: milestoneNumber
                });
              }
            }

            // Change status from needs-triage to needs-review
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'needs-triage'
              });
            } catch (e) {
              console.log('Could not remove needs-triage label:', e.message);
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['needs-review']
            });
